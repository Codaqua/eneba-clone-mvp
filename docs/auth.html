<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identifícate - Eneba Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">ENEBA CLONE</a>
        <div class="search-bar">
            <input type="text" placeholder="Buscar juegos divertidos...">
            <button type="button">Buscar</button>
        </div>
        <nav class="nav-links">
            <a href="store.html">Tienda</a>
            <a href="#" class="cart-icon">🛒<span class="cart-count">0</span></a>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h1>Bienvenido de nuevo</h1>
                <p>Accede a tu cuenta para gestionar tus juegos</p>
            </div>

            <form id="generic-login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña secreta" required>
                </div>
                <button type="submit" class="btn-primary btn-auth">Iniciar Sesión</button>
            </form>

            <div class="auth-footer">
                ¿Aún no tienes cuenta? <a href="#">Regístrate aquí</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Eneba Clone MVP. Proyecto Educativo.</p>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
